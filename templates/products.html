{% extends 'base.html' %}
{% block content %}

<h3 class="mb-4">Products</h3>

<!-- 🔥 ADD FORM -->
<form method="POST" class="row g-3 mb-4">
    <div class="col-md-3">
        <input type="text" name="name" class="form-control" placeholder="Product Name" required>
    </div>
    <div class="col-md-3">
        <input type="text" name="size" class="form-control" placeholder="Size (e.g. 1L, 500ml)" required>
    </div>
    <div class="col-md-2">
        <button class="btn btn-success w-100">Add Product</button>
    </div>
</form>

<!-- 🔥 TABLE -->
<table class="table table-bordered table-hover">
    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Size</th>
            <th>Stock</th>
            <th>Action</th>
        </tr>
    </thead>

    <tbody>
    {% for p in products %}
        <tr>
            <td>{{ p[0] }}</td>
            <td>{{ p[1] }}</td>
            <td>{{ p[2] }}</td>
            <td>
                <span class="badge bg-info">{{ p[3] }}</span>
            </td>
            <td>
                <!-- EDIT -->
                <a href="/product/edit/{{p[0]}}" class="btn btn-warning btn-sm">Edit</a>

                <!-- DELETE -->
                <a href="/product/delete/{{p[0]}}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Are you sure?')">
                   Delete
                </a>
            </td>
        </tr>
    {% endfor %}
    </tbody>
</table>

{% endblock %}
