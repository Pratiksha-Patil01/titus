{% extends 'base.html' %}
{% block content %}

<h3 class="mb-4">Purchase</h3>

<form method="POST" class="card p-4 shadow">

    <div class="row mb-3">
        <!-- 🔥 VENDOR -->
        <div class="col-md-6">
            <label class="form-label">Vendor</label>
            <select name="vendor" class="form-select" required>
                <option value="">Select Vendor</option>
                {% for v in vendors %}
                <option value="{{ v[0] }}">{{ v[1] }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- 🔥 PRODUCT -->
        <div class="col-md-6">
            <label class="form-label">Product</label>
            <select name="product" class="form-select" required>
                <option value="">Select Product</option>
                {% for p in products %}
                <option value="{{ p[0] }}">{{ p[1] }}</option>
                {% endfor %}
            </select>
        </div>
    </div>

    <div class="row mb-3">
        <!-- 🔥 QTY -->
        <div class="col-md-6">
            <label class="form-label">Quantity</label>
            <input type="number" name="qty" class="form-control" min="1" required>
        </div>

        <!-- 🔥 PRICE -->
        <div class="col-md-6">
            <label class="form-label">Price</label>
            <input type="number" name="price" class="form-control" min="1" step="0.01" required>
        </div>
    </div>

    <!-- 🔥 BUTTON -->
    <div class="text-center">
        <button type="submit" class="btn btn-success px-5">Buy Product</button>
    </div>

</form>

{% endblock %}
