{% extends 'base.html' %}
{% block content %}

<h3 class="mb-4">Edit Customer</h3>

<form method="POST" class="card p-4 shadow">

    <!-- NAME -->
    <div class="mb-3">
        <label class="form-label">Name</label>
        <input type="text" name="name" value="{{ customer[1] }}" class="form-control" required>
    </div>

    <!-- PHONE -->
    <div class="mb-3">
        <label class="form-label">Phone</label>
        <input type="text" name="phone" value="{{ customer[2] }}" class="form-control">
    </div>

    <!-- BUTTONS -->
    <div class="text-center">
        <button class="btn btn-success px-4">Update</button>
        <a href="/customers" class="btn btn-secondary px-4">Cancel</a>
    </div>

</form>

{% endblock %}
