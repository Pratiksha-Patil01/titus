{% extends 'base.html' %}
{% block content %}

<h3 class="mb-4">Sales</h3>

<!-- 🔥 SALES FORM -->
<form method="POST" class="card p-4 shadow mb-4">

    <div class="row mb-3">

        <!-- CUSTOMER -->
        <div class="col-md-6">
            <label class="form-label">Customer</label>
            <select name="customer" class="form-select" required>
                <option value="">Select Customer</option>
                {% for c in customers %}
                <option value="{{ c[0] }}">{{ c[1] }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- PRODUCT -->
        <div class="col-md-6">
            <label class="form-label">Product</label>
            <select name="product" class="form-select" required>
                <option value="">Select Product</option>
                {% for p in products %}
                <option value="{{ p[0] }}">
                    {{ p[1] }} (Stock: {{ p[3] }})
                </option>
                {% endfor %}
            </select>
        </div>

    </div>

    <div class="row mb-3">

        <!-- QTY -->
        <div class="col-md-6">
            <label class="form-label">Quantity</label>
            <input type="number" name="qty" class="form-control" min="1" required>
        </div>

        <!-- PRICE -->
        <div class="col-md-6">
            <label class="form-label">Price</label>
            <input type="number" name="price" class="form-control" min="1" required>
        </div>

    </div>

    <div class="text-center">
        <button type="submit" class="btn btn-danger px-5">Sell Product</button>
    </div>

</form>

<!-- 🔥 SALES TABLE -->
<h4 class="mb-3">Sales Records</h4>

<table class="table table-bordered table-hover">
    <thead class="table-dark">
        <tr>
            <th>Bill No</th>
            <th>Customer</th>
            <th>Product</th>
            <th>Qty</th>
            <th>Price</th>
            <th>Total</th>
           
        </tr>
    </thead>

    <tbody>
    {% for s in sales %}
        <tr>
            <td><b>{{ s[0] }}</b></td>
            <td>{{ s[1] }}</td>
            <td>{{ s[2] }}</td>
            <td>{{ s[3] }}</td>
            <td>₹{{ s[4] }}</td>
            <td><span class="badge bg-success">₹{{ s[5] }}</span></td>

            
        </tr>
    {% endfor %}
    </tbody>
</table>

{% endblock %}
