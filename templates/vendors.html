{% extends 'base.html' %}
{% block content %}

<h3 class="mb-4">Vendors</h3>

<!-- 🔥 ADD FORM -->
<form method="POST" class="row g-3 mb-4">
    <div class="col-md-4">
        <input type="text" name="name" class="form-control" placeholder="Vendor Name" required>
    </div>
    <div class="col-md-4">
        <input type="text" name="phone" class="form-control" placeholder="Phone">
    </div>
    <div class="col-md-2">
        <button class="btn btn-primary w-100">Add Vendor</button>
    </div>
</form>

<!-- 🔥 TABLE -->
<table class="table table-bordered table-hover">
    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Phone</th>
            <th>Action</th>
        </tr>
    </thead>

    <tbody>
    {% for v in vendors %}
        <tr>
            <td>{{ v[0] }}</td>
            <td>{{ v[1] }}</td>
            <td>{{ v[2] }}</td>
            <td>
                <!-- EDIT -->
                <a href="/vendor/edit/{{v[0]}}" class="btn btn-warning btn-sm">Edit</a>

                <!-- DELETE -->
                <a href="/vendor/delete/{{v[0]}}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Are you sure?')">
                   Delete
                </a>
            </td>
        </tr>
    {% endfor %}
    </tbody>
</table>

{% endblock %}
